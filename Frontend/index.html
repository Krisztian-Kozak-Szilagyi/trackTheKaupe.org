<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>theKaupeTracker.org</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poetsen+One&display=swap" rel="stylesheet">
</head>
<body>
    <main class="smash-or-pass">
        <h1 clasS="title-question">Which game does Luca have?</h1>
        <div class="main-container">
            <div class="card left-card" id="leftCard">
                <div class="card-holder">
                    <img class="game-cover-img" src="assets/images/boyfriend-dungeon.png" alt="A picture of a game" id="leftCardImg">
                </div>
                <p class="game-title" id="gameTitleLeft">Boyfriend Dungeon</p>
            </div>
            <div class="card right-card" id="rightCard">
                <div clasS="card-holder">
                    <img class="game-cover-img" src="assets/images/gast-station.png" alt="A pictore of a game" id="rightCardImg">    
                </div>
                <p class="game-title" id="gameTitleRight">Gas Station Simulator</p>
            </div>
        </div>
        <div class="wrong-answer" id="wrongAnswer">
            <h1 clasS="wrong-answer-h1">WRONG ANSWER</h1>
            <a href="#"><p>Try again</p></a>
        </div>
    </main>
</body>
</html>
